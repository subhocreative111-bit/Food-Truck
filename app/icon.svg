<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Rounded ember-red square -->
  <rect width="64" height="64" rx="14" fill="#C8463A"/>
  <!-- Food-truck silhouette in cream, optimized for legibility at 16×16 -->
  <g stroke="#FAF4E8" stroke-width="3.4" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <!-- truck body (cab + bed) -->
    <path d="M8 30 L38 30 L36 18 L12 18 Z"/>
    <!-- back box (kitchen area) -->
    <path d="M38 30 L46 30 L54 36 L54 42 L48 42"/>
    <!-- wheels (filled cream) -->
    <circle cx="18" cy="46" r="4.5" fill="#FAF4E8" stroke="none"/>
    <circle cx="44" cy="46" r="4.5" fill="#FAF4E8" stroke="none"/>
    <!-- ground line connecting frame -->
    <path d="M8 38 L38 38"/>
  </g>
  <!-- Saffron accent dot (matches site brand) -->
  <circle cx="32" cy="24" r="1.6" fill="#F2A53A"/>
</svg>
